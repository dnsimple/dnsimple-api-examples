version: 2
updates:
  - package-ecosystem: "terraform"
    directory: "/terraform/terraform-zone"
    schedule:
      interval: "monthly"
    labels:
      - dependencies

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels:
      - task
      - dependencies
    cooldown:
      default-days: 3
    groups:
      actions-patch-minor:
        update-types:
          - patch
          - minor
